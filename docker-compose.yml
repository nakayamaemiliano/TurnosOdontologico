services:
  mysql:
    image: mysql:8.4
    container_name: turnos-odontologico-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-turnosOdontologico}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: turnos-odontologico-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-turnosOdontologico}?useSSL=false&serverTimezone=America/Argentina/Cordoba&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-change-this-secret-key-before-production}
      JWT_USER_GENERATOR: ${JWT_USER_GENERATOR:-TURNOS_ODONTOLOGICO_API}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      APP_SEED_ADMIN_USERNAME: ${APP_SEED_ADMIN_USERNAME:-codex_admin}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-admin123}
    ports:
      - "8080:8080"

volumes:
  mysql_data:
