spring.application.name=turnosOdontologico
# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8080}
spring.jpa.open-in-view=false

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ===============================
# SECURITY CONFIG
# ===============================
security.jwt.private.key = ${JWT_PRIVATE_KEY}
security.jwt.user.generator=${JWT_USER_GENERATOR}

# ===============================
# INITIAL DATA
# ===============================
app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.admin.username=${APP_SEED_ADMIN_USERNAME:codex_admin}
app.seed.admin.password=${APP_SEED_ADMIN_PASSWORD:admin123}
